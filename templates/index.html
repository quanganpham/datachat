<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Châu - DataChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #F2F4F7;
            --bg-card: #FFFFFF;
            --bg-elevated: #F8F9FA;
            --bg-input: #FFFFFF;
            --bg-sidebar: #FFFFFF;
            --text-primary: #1a2332;
            --text-secondary: #5a6a7a;
            --text-muted: #8899aa;
            --accent: #01B5B4;
            --accent-glow: rgba(1, 181, 180, 0.2);
            --accent-hover: #02D4D3;
            --accent-orange: #F16D23;
            --success: #16a34a;
            --error: #ef4444;
            --border: rgba(0, 0, 0, 0.08);
            --gradient-1: linear-gradient(135deg, #01B5B4 0%, #02A09F 50%, #018786 100%);
            --gradient-cta: linear-gradient(135deg, #FFBD14 0%, #F16D23 100%);
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Animated background ── */
        .bg-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .bg-effect::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(1,181,180,0.06) 0%, transparent 40%),
                        radial-gradient(circle at 70% 80%, rgba(241,109,35,0.04) 0%, transparent 40%);
            animation: bgPulse 15s ease-in-out infinite;
        }
        @keyframes bgPulse {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(-2%,-2%) scale(1.05); }
        }

        /* ── Sidebar ── */
        .sidebar {
            position: relative; z-index: 20;
            width: var(--sidebar-width); min-width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: transform 0.3s ease;
        }
        .sidebar-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }
        .new-chat-btn {
            width: 100%; padding: 0.75rem 1rem;
            border: 1px dashed var(--border); border-radius: 12px;
            background: transparent; color: var(--text-primary);
            font-size: 0.875rem; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; gap: 0.5rem;
            transition: all 0.2s;
        }
        .new-chat-btn:hover {
            background: var(--accent); border-color: var(--accent);
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .sidebar-list {
            flex: 1; overflow-y: auto; padding: 0.5rem;
            scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.1) transparent;
        }
        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }
        .conv-item {
            padding: 0.75rem 1rem; border-radius: 10px;
            cursor: pointer; margin-bottom: 2px;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.15s; position: relative;
        }
        .conv-item:hover { background: var(--bg-elevated); }
        .conv-item.active { background: rgba(1,181,180,0.1); border: 1px solid rgba(1,181,180,0.25); }
        .conv-item-text {
            flex: 1; font-size: 0.825rem; color: var(--text-secondary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .conv-item.active .conv-item-text { color: var(--text-primary); font-weight: 500; }
        .conv-item-delete {
            opacity: 0; background: none; border: none;
            color: var(--text-muted); cursor: pointer; font-size: 0.75rem;
            padding: 4px 6px; border-radius: 6px; transition: all 0.15s;
            flex-shrink: 0; margin-left: 4px;
        }
        .conv-item:hover .conv-item-delete { opacity: 1; }
        .conv-item-delete:hover { background: var(--error); color: white; }

        /* ── Main area ── */
        .main-area {
            flex: 1; display: flex; flex-direction: column;
            position: relative; z-index: 5; min-width: 0;
        }
        .header {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #01B5B4 0%, #02A09F 100%);
            border-bottom: none;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 12px rgba(1,181,180,0.25);
        }
        .logo { display: flex; align-items: center; gap: 0.75rem; }
        .logo-icon {
            width: 44px; height: 44px;
            border-radius: 50%; overflow: hidden;
            flex-shrink: 0;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .logo-icon img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .logo-text h1 {
            font-size: 1.3rem; font-weight: 700;
            color: white; letter-spacing: -0.3px;
        }
        .logo-text p { font-size: 0.8rem; color: rgba(255,255,255,0.8); margin-top: 1px; }
        .header-actions { display: flex; gap: 0.5rem; align-items: center; }
        .btn-icon {
            width: 36px; height: 36px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.15);
            color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-size: 0.9rem;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.3); color: white; border-color: rgba(255,255,255,0.5); }
        .hamburger { display: none; }

        /* ── Dataset Switcher ── */
        .dataset-switcher {
            display: flex;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 3px;
            gap: 2px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .dataset-btn {
            padding: 0.4rem 0.85rem;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            white-space: nowrap;
            font-family: inherit;
        }
        .dataset-btn:hover {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .dataset-btn.active {
            background: white;
            color: var(--accent);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-weight: 600;
        }

        /* ── Chat container ── */
        .chat-area {
            flex: 1; display: flex; flex-direction: column;
            max-width: 900px; width: 100%; margin: 0 auto;
            padding: 1rem 1.5rem; min-height: 0;
        }
        .chat-container {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 1rem 0.5rem 1rem 0;
            display: flex; flex-direction: column; gap: 1.5rem;
            min-height: 0; scrollbar-width: thin;
            scrollbar-color: rgba(0,0,0,0.1) transparent;
        }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

        /* ── Welcome ── */
        .welcome {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 2rem;
        }
        .welcome-icon {
            width: 72px; height: 72px; background: var(--gradient-1);
            border-radius: 20px; display: flex; align-items: center;
            justify-content: center; font-size: 2.25rem;
            margin-bottom: 1.25rem; box-shadow: 0 8px 40px var(--accent-glow);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .welcome h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.6rem; }
        .welcome p { color: var(--text-secondary); max-width: 450px; line-height: 1.7; font-size: 1.05rem; }
        .examples { display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: center; margin-top: 1.5rem; }
        .example-btn {
            padding: 0.6rem 1rem; background: var(--bg-elevated);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--text-primary); font-size: 0.95rem;
            cursor: pointer; transition: all 0.2s;
        }
        .example-btn:hover {
            background: var(--accent); border-color: var(--accent);
            transform: translateY(-2px); box-shadow: 0 4px 20px var(--accent-glow);
        }

        /* ── Messages ── */
        .message { display: flex; gap: 0.75rem; animation: slideIn 0.3s ease; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { flex-direction: row-reverse; }
        .avatar {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; flex-shrink: 0;
        }
        .message.user .avatar { background: var(--gradient-1); }
        .message.assistant .avatar { background: var(--bg-elevated); border: 1px solid var(--border); }
        .message-content { max-width: 78%; }
        .message-bubble {
            padding: 0.85rem 1.1rem; border-radius: 14px;
            line-height: 1.7; font-size: 0.92rem;
        }
        .message.user .message-bubble { background: var(--accent); border-bottom-right-radius: 4px; color: white; }
        .message.assistant .message-bubble {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* ── Markdown rendering in messages ── */
        .message.assistant .message-bubble p { margin-bottom: 0.5rem; }
        .message.assistant .message-bubble p:last-child { margin-bottom: 0; }
        .message.assistant .message-bubble strong { color: var(--text-primary); font-weight: 600; }
        .message.assistant .message-bubble ul, .message.assistant .message-bubble ol {
            margin: 0.4rem 0 0.6rem 1.2rem; padding: 0;
        }
        .message.assistant .message-bubble li { margin-bottom: 0.25rem; }
        .message.assistant .message-bubble code {
            background: rgba(1,181,180,0.1); padding: 0.15rem 0.4rem;
            border-radius: 4px; font-size: 0.85em; color: var(--accent);
        }

        /* ── SQL & Data ── */
        .sql-container {
            margin-top: 0.75rem; background: #f0f4f4;
            border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
        }
        .sql-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.6rem 0.85rem; background: rgba(1,181,180,0.1);
            border-bottom: 1px solid var(--border);
        }
        .sql-header span {
            font-size: 0.7rem; font-weight: 600; color: var(--accent);
            display: flex; align-items: center; gap: 0.4rem;
        }
        .copy-btn {
            padding: 0.2rem 0.4rem; border: none; border-radius: 5px;
            background: transparent; color: var(--text-muted);
            font-size: 0.65rem; cursor: pointer; transition: all 0.15s;
        }
        .copy-btn:hover { background: var(--accent); color: white; }
        .sql-code {
            padding: 0.75rem 1rem; font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.75rem; line-height: 1.6; overflow-x: auto;
            white-space: pre-wrap; word-break: break-word;
            color: #334155;
        }
        .sql-keyword { color: #7c3aed; font-weight: 600; }
        .sql-string { color: #ea580c; }
        .sql-number { color: #0d9488; }
        .sql-function { color: #2563eb; }

        .data-container {
            margin-top: 0.5rem; border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden;
        }
        .data-header {
            padding: 0.6rem 0.85rem; background: rgba(241,109,35,0.08);
            border-bottom: 1px solid var(--border);
        }
        .data-header span {
            font-size: 0.7rem; font-weight: 600; color: var(--accent-orange);
            display: flex; align-items: center; gap: 0.4rem;
        }
        .data-table-wrap { overflow-x: auto; max-height: 350px; }
        .data-table {
            width: 100%; border-collapse: collapse; font-size: 0.78rem;
        }
        .data-table th {
            background: var(--bg-elevated); padding: 0.55rem 0.75rem;
            text-align: left; font-weight: 600; color: var(--text-primary);
            border-bottom: 2px solid var(--border); white-space: nowrap;
            position: sticky; top: 0; z-index: 1;
        }
        .data-table td {
            padding: 0.45rem 0.75rem; border-bottom: 1px solid rgba(0,0,0,0.04);
            color: var(--text-secondary); max-width: 250px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .data-table tbody tr:nth-child(even) { background: rgba(0,0,0,0.015); }
        .data-table tbody tr:hover { background: rgba(1,181,180,0.05); }

        /* ── Input area ── */
        .input-area { padding: 0 0 0.5rem; }
        .input-wrapper {
            display: flex; gap: 0.5rem;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 14px; padding: 0.5rem 0.5rem 0.5rem 1rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: border-color 0.2s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        #questionInput {
            flex: 1; border: none; outline: none;
            font-size: 0.95rem; color: var(--text-primary);
            background: transparent; font-family: inherit;
        }
        #questionInput::placeholder { color: var(--text-muted); }
        .send-btn {
            padding: 0.55rem 1.25rem; background: var(--gradient-1);
            border: none; border-radius: 10px; color: white;
            font-weight: 600; font-size: 0.85rem; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── Loading ── */
        .loading-dots { display: flex; gap: 4px; padding: 0.4rem 0; }
        .loading-dots span {
            width: 8px; height: 8px; background: var(--accent);
            border-radius: 50%; animation: bounce 1.4s infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%,80%,100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); z-index: 100; }
            .sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,0.1); }
            .sidebar-overlay {
                display: none; position: fixed; top: 0; left: 0;
                width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 99;
            }
            .sidebar.open ~ .sidebar-overlay { display: block; }
            .hamburger { display: flex !important; }
            .chat-area { padding: 0.75rem; }
            .message-content { max-width: 90%; }
            .dataset-switcher { display: none; }
        }
    </style>
</head>

<body>
    <div class="bg-effect"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn" onclick="createNewChat()">
                ✨ Cuộc hội thoại mới
            </button>
        </div>
        <div class="sidebar-list" id="conversationList">
            <!-- Conversations loaded here -->
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Main area -->
    <div class="main-area">
        <header class="header">
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <button class="btn-icon hamburger" onclick="toggleSidebar()">☰</button>
                <div class="logo">
                    <div class="logo-icon"><img src="/static/logo.png" alt="Long Châu"></div>
                    <div class="logo-text">
                        <h1 id="headerTitle">Tiêm Chủng Long Châu</h1>
                        <p id="headerSubtitle">DataChat - Phân tích dữ liệu vaccine</p>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <div class="dataset-switcher" id="datasetSwitcher">
                    <button class="dataset-btn active" data-dataset="vaccine" onclick="switchDataset('vaccine')">
                        💉 Vaccine
                    </button>
                    <button class="dataset-btn" data-dataset="longchau" onclick="switchDataset('longchau')">
                        💊 Nhà Thuốc
                    </button>
                </div>
                <button class="btn-icon" onclick="createNewChat()" title="Hội thoại mới">✨</button>
            </div>
        </header>

        <div class="chat-area">
            <div class="chat-container" id="chatContainer">
                <div class="welcome" id="welcomeScreen">
                    <div class="welcome-icon" id="welcomeIcon">💉</div>
                    <h2>Xin chào!</h2>
                    <p id="welcomeText">Tôi là trợ lý phân tích dữ liệu Tiêm Chủng Long Châu. Hãy hỏi tôi bất kỳ điều gì về dữ liệu vaccine bằng tiếng Việt.</p>
                    <div class="examples" id="exampleButtons">
                        <button class="example-btn" onclick="askExample(this)">💉 Top 5 vaccine bán chạy nhất</button>
                        <button class="example-btn" onclick="askExample(this)">📊 Doanh thu theo khu vực</button>
                        <button class="example-btn" onclick="askExample(this)">🏥 Số mũi tiêm theo trung tâm</button>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="questionInput" placeholder="Hỏi bất kỳ điều gì về dữ liệu..."
                        onkeypress="if(event.key==='Enter' && !event.shiftKey) sendQuestion()">
                    <button class="send-btn" id="sendBtn" onclick="sendQuestion()">
                        Gửi ➤
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── State ──
        let currentConversationId = null;
        let currentDataset = 'vaccine';
        const chatContainer = document.getElementById('chatContainer');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');

        // ── Dataset Config ──
        const DATASET_CONFIG = {
            vaccine: {
                title: 'Tiêm Chủng Long Châu',
                subtitle: 'DataChat - Phân tích dữ liệu vaccine',
                welcomeIcon: '💉',
                welcomeText: 'Tôi là trợ lý phân tích dữ liệu Tiêm Chủng Long Châu. Hãy hỏi tôi bất kỳ điều gì về dữ liệu vaccine bằng tiếng Việt.',
                examples: [
                    '💉 Top 5 vaccine bán chạy nhất',
                    '📊 Doanh thu theo khu vực',
                    '🏥 Số mũi tiêm theo trung tâm'
                ],
                placeholder: 'Hỏi về dữ liệu vaccine...'
            },
            longchau: {
                title: 'Nhà Thuốc Long Châu',
                subtitle: 'DataChat - Phân tích dữ liệu nhà thuốc',
                welcomeIcon: '💊',
                welcomeText: 'Tôi là trợ lý phân tích dữ liệu Nhà Thuốc Long Châu. Hãy hỏi tôi bất kỳ điều gì về dữ liệu dược phẩm bằng tiếng Việt.',
                examples: [
                    '💊 Top 10 sản phẩm bán chạy nhất',
                    '📊 Phân bổ sản phẩm theo ngành hàng',
                    '🏪 Số đơn hàng theo nhóm giá'
                ],
                placeholder: 'Hỏi về dữ liệu nhà thuốc...'
            }
        };

        // ── Init ──
        document.addEventListener('DOMContentLoaded', () => {
            loadConversations();
        });

        // ── Dataset Switching ──
        function switchDataset(dataset) {
            if (dataset === currentDataset) return;
            currentDataset = dataset;

            // Update active button
            document.querySelectorAll('.dataset-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.dataset === dataset);
            });

            // Update header
            const cfg = DATASET_CONFIG[dataset];
            document.getElementById('headerTitle').textContent = cfg.title;
            document.getElementById('headerSubtitle').textContent = cfg.subtitle;

            // Update welcome screen
            document.getElementById('welcomeIcon').textContent = cfg.welcomeIcon;
            document.getElementById('welcomeText').textContent = cfg.welcomeText;
            const exBtns = document.getElementById('exampleButtons');
            exBtns.innerHTML = cfg.examples.map(ex =>
                `<button class="example-btn" onclick="askExample(this)">${ex}</button>`
            ).join('');

            // Update input placeholder
            questionInput.placeholder = cfg.placeholder;

            // Create new chat for new dataset
            createNewChat();
        }

        // ── Sidebar ──
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        async function loadConversations() {
            try {
                const res = await fetch('/conversations');
                const convs = await res.json();
                renderConversationList(convs);
            } catch (e) { console.error('Failed to load conversations:', e); }
        }

        function renderConversationList(convs) {
            const list = document.getElementById('conversationList');
            if (convs.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:2rem 1rem;font-size:0.8rem;">Chưa có hội thoại nào</p>';
                return;
            }
            list.innerHTML = convs.map(c => `
                <div class="conv-item ${c.id === currentConversationId ? 'active' : ''}"
                     onclick="selectConversation('${c.id}')">
                    <span class="conv-item-text">💬 ${escapeHtml(c.title)}</span>
                    <button class="conv-item-delete" onclick="event.stopPropagation(); deleteConversation('${c.id}')" title="Xóa">🗑</button>
                </div>
            `).join('');
        }

        async function selectConversation(convId) {
            currentConversationId = convId;
            document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
            const activeEl = [...document.querySelectorAll('.conv-item')].find(el => el.onclick.toString().includes(convId));
            if (activeEl) activeEl.classList.add('active');

            try {
                const res = await fetch(`/conversations/${convId}/messages`);
                const data = await res.json();
                renderMessages(data.messages);
            } catch (e) { console.error('Failed to load messages:', e); }

            document.getElementById('sidebar').classList.remove('open');
        }

        function renderMessages(messages) {
            chatContainer.innerHTML = '';
            if (messages.length === 0) {
                chatContainer.appendChild(welcomeScreen);
                welcomeScreen.style.display = 'flex';
                return;
            }
            welcomeScreen.style.display = 'none';
            messages.forEach(msg => {
                if (msg.role === 'user') {
                    addMessageUI(msg.content, 'user');
                } else {
                    addMessageUI(msg.content, 'assistant', {
                        sql: msg.sql_query,
                        data: msg.sql_data,
                        columns: msg.sql_columns,
                        row_count: msg.row_count
                    });
                }
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function createNewChat() {
            currentConversationId = null;
            chatContainer.innerHTML = '';
            chatContainer.appendChild(welcomeScreen);
            welcomeScreen.style.display = 'flex';
            questionInput.focus();
            document.getElementById('sidebar').classList.remove('open');
            await loadConversations();
        }

        async function deleteConversation(convId) {
            try {
                await fetch(`/conversations/${convId}`, { method: 'DELETE' });
                if (currentConversationId === convId) {
                    currentConversationId = null;
                    chatContainer.innerHTML = '';
                    chatContainer.appendChild(welcomeScreen);
                    welcomeScreen.style.display = 'flex';
                }
                await loadConversations();
            } catch (e) { console.error('Failed to delete:', e); }
        }

        // ── Chat ──
        function askExample(btn) {
            const text = btn.textContent.replace(/^[^\s]+\s/, '');
            questionInput.value = text;
            sendQuestion();
        }

        function hideWelcome() {
            if (welcomeScreen) welcomeScreen.style.display = 'none';
        }

        // ── Markdown Rendering ──
        function renderMarkdown(text) {
            // Escape HTML first
            let html = escapeHtml(text);

            // Bold: **text**
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // Italic: *text*
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Inline code: `text`
            html = html.replace(/`(.+?)`/g, '<code>$1</code>');

            // Unordered list items: - item or • item
            html = html.replace(/^[\-•]\s+(.+)$/gm, '<li>$1</li>');

            // Ordered list items: 1. item
            html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

            // Wrap consecutive <li> in <ul>
            html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

            // Line breaks
            html = html.replace(/\n/g, '<br>');

            // Clean up extra <br> around lists
            html = html.replace(/<br><ul>/g, '<ul>');
            html = html.replace(/<\/ul><br>/g, '</ul>');
            html = html.replace(/<br><li>/g, '<li>');

            return html;
        }

        // ── SQL Syntax Highlighting ──
        function highlightSQL(sql) {
            const escaped = escapeHtml(sql);
            const keywords = ['SELECT', 'FROM', 'WHERE', 'JOIN', 'LEFT JOIN', 'RIGHT JOIN', 'INNER JOIN',
                'ON', 'AND', 'OR', 'NOT', 'IN', 'AS', 'GROUP BY', 'ORDER BY', 'HAVING',
                'LIMIT', 'OFFSET', 'UNION', 'DISTINCT', 'COUNT', 'SUM', 'AVG', 'MAX', 'MIN',
                'CASE', 'WHEN', 'THEN', 'ELSE', 'END', 'IS', 'NULL', 'LIKE', 'BETWEEN',
                'WITH', 'DESC', 'ASC', 'CAST', 'INTEGER', 'TEXT', 'REAL', 'COALESCE',
                'GROUP_CONCAT', 'SUBSTR', 'INSTR', 'REPLACE', 'TRIM', 'ROUND'];

            let result = escaped;

            // Highlight strings (single-quoted)
            result = result.replace(/'([^']*)'/g, '<span class="sql-string">\'$1\'</span>');

            // Highlight numbers
            result = result.replace(/\b(\d+\.?\d*)\b/g, '<span class="sql-number">$1</span>');

            // Highlight keywords (case-insensitive)
            keywords.forEach(kw => {
                const regex = new RegExp(`\\b(${kw})\\b`, 'gi');
                result = result.replace(regex, '<span class="sql-keyword">$1</span>');
            });

            return result;
        }

        // ── Number Formatting ──
        function formatCellValue(val) {
            if (val === null || val === undefined || val === 'None') return '—';
            const str = String(val);
            // Format large numbers with comma separators
            const num = Number(str);
            if (!isNaN(num) && str.match(/^\d+\.?\d*$/)) {
                if (Number.isInteger(num) && num >= 1000) {
                    return num.toLocaleString('vi-VN');
                }
                if (!Number.isInteger(num)) {
                    return num.toLocaleString('vi-VN', { maximumFractionDigits: 2 });
                }
            }
            return escapeHtml(str);
        }

        function addMessageUI(content, type, extra = null) {
            hideWelcome();
            const msg = document.createElement('div');
            msg.className = `message ${type}`;

            let bubbleContent = '';

            if (type === 'user') {
                bubbleContent = `<p>${escapeHtml(content)}</p>`;
            } else {
                // Render markdown for assistant messages
                bubbleContent = renderMarkdown(content);
            }

            if (extra) {
                if (extra.sql) {
                    bubbleContent += `
                        <div class="sql-container">
                            <div class="sql-header">
                                <span>📝 SQL Query</span>
                                <button class="copy-btn" onclick="copySQL(this)">Sao chép</button>
                            </div>
                            <pre class="sql-code">${highlightSQL(extra.sql)}</pre>
                        </div>`;
                }
                if (extra.data && extra.columns && extra.data.length > 0) {
                    const rows = extra.data.slice(0, 10);
                    bubbleContent += `
                        <div class="data-container">
                            <div class="data-header">
                                <span>📊 Kết quả (${extra.row_count} dòng${extra.row_count > 10 ? ', hiển thị 10' : ''})</span>
                            </div>
                            <div class="data-table-wrap">
                                <table class="data-table">
                                    <thead><tr>${extra.columns.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr></thead>
                                    <tbody>${rows.map(row =>
                                        `<tr>${row.map(cell => `<td>${formatCellValue(cell)}</td>`).join('')}</tr>`
                                    ).join('')}</tbody>
                                </table>
                            </div>
                        </div>`;
                }
            }

            msg.innerHTML = `
                <div class="avatar">${type === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">
                    <div class="message-bubble">${bubbleContent}</div>
                </div>`;

            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addLoading() {
            hideWelcome();
            const msg = document.createElement('div');
            msg.className = 'message assistant';
            msg.id = 'loadingMsg';
            msg.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="message-content">
                    <div class="message-bubble">
                        <div class="loading-dots"><span></span><span></span><span></span></div>
                    </div>
                </div>`;
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeLoading() {
            const el = document.getElementById('loadingMsg');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copySQL(btn) {
            const sql = btn.closest('.sql-container').querySelector('.sql-code').textContent;
            navigator.clipboard.writeText(sql);
            btn.textContent = 'Đã sao chép!';
            setTimeout(() => btn.textContent = 'Sao chép', 2000);
        }

        async function sendQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;

            questionInput.value = '';
            addMessageUI(question, 'user');
            addLoading();
            sendBtn.disabled = true;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question,
                        conversation_id: currentConversationId,
                        dataset: currentDataset
                    })
                });

                const data = await res.json();
                removeLoading();

                if (data.conversation_id) {
                    currentConversationId = data.conversation_id;
                }

                addMessageUI(data.answer, 'assistant', {
                    sql: data.sql,
                    data: data.data,
                    columns: data.columns,
                    row_count: data.row_count
                });

                await loadConversations();

            } catch (err) {
                removeLoading();
                addMessageUI(`❌ Lỗi: ${err.message}`, 'assistant');
            }

            sendBtn.disabled = false;
            questionInput.focus();
        }
    </script>
</body>

</html>
